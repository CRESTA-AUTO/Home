<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車両一覧 - CRESTA-AUTO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">CRESTA-AUTO</div>
        <nav>
            <ul>
                <li><a href="index.html">ホーム</a></li>
                <li><a href="cars.html" class="active">車両一覧</a></li>
            </ul>
        </nav>
        <a href="#booking" class="btn-booking">予約する</a>
    </header>

    <main>
        <div id="car-list-container">
            <p id="loading-message">車両データを読み込み中です...</p>
        </div>
    </main>

    <script>
        // --- 設定エリア ---
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzCohegTqgSW7R5t8Oxr_eFw7bB4zjNEVW4vy3vNYFDsGCiWJnBeMtHXAQOqEEasoZt/exec"; 
        // ------------------

        async function fetchCars() {
            try {
                const response = await fetch(GAS_API_URL);
                if (!response.ok) throw new Error("データの取得に失敗しました");
                const cars = await response.json();
                renderCars(cars);
            } catch (error) {
                console.error(error);
                document.getElementById('loading-message').innerText = "エラー：車両データを読み込めませんでした。";
            }
        }

        function renderCars(cars) {
            const container = document.getElementById('car-list-container');
            container.innerHTML = ''; 
            
            cars.forEach(car => {
                // 【修正ポイント】スプレッドシートの「画像URL」列をそのまま使用する
                // キー名が「画像URL」であることを確認してください。GASの書き出しに合わせます。
                const imageUrl = car.画像URL || "https://via.placeholder.com/400x250?text=No+Image";
                
                let statusHtml = '';
                let buyButtonHtml = '';
                
                if (car.販売状況 === '販売中') {
                    statusHtml = `<span class="car-status status-onsale">【販売中】</span>`;
                    buyButtonHtml = `<a href="${car.購入リンク}" class="btn-buy" target="_blank">買う</a>`;
                } else if (car.販売状況 === '販売終了') {
                    statusHtml = `<span class="car-status status-sold">【販売終了】</span>`;
                    buyButtonHtml = `<span class="btn-buy disabled">購入不可</span>`;
                }

                const carCardHtml = `
                    <div class="car-card">
                        <img src="${imageUrl}" alt="${car.車名}" class="car-image">
                        <div class="car-details">
                            <h2 class="car-name">${car.車名}</h2>
                            <p class="car-price">価格: ${car.価格}</p>
                            <p class="car-spec" style="white-space: pre-wrap;">${car.備考}</p>
                            <div class="purchase-area">
                                ${statusHtml}<br>
                                ${buyButtonHtml}
                            </div>
                        </div>
                    </div>
                `;
                
                container.innerHTML += carCardHtml;
            });
        }

        fetchCars();
    </script>
</body>
</html>
