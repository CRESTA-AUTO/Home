<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALLERY - CRESTA-AUTO</title>
    <style>
        /* --- 全体の設定 --- */
        body {
            background-color: #121212;
            color: #eeeeee;
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* --- ヘッダー（車両一覧のデザインを完全移植） --- */
        header {
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 15px 20px;
            display: flex;
            flex-direction: column; /* 縦に並べて中央へ */
            align-items: center;    /* 全要素を中央寄せ */
            gap: 15px;
        }

        .logo {
            color: #ffffff;
            font-weight: bold;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
            padding: 0;
            margin: 0;
        }

        nav a {
            color: #cccccc;
            text-decoration: none;
            transition: 0.3s;
            font-size: 15px;
        }

        nav a:hover, nav a.active {
            color: #00ff99;
            border-bottom: 2px solid #00ff99;
        }

        .btn-booking {
            background-color: transparent;
            color: #00ff99;
            border: 1px solid #00ff99;
            padding: 8px 30px;
            text-decoration: none;
            border-radius: 4px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-booking:hover {
            background-color: #00ff99;
            color: #000;
        }

        /* --- ギャラリーコンテンツ --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 40px;
            letter-spacing: 4px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            color: #ffffff;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .gallery-card {
            background-color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s ease;
        }

        .gallery-card:hover {
            transform: translateY(-8px);
            border-color: #00ff99;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .image-box {
            width: 100%;
            height: 200px;
            background-color: #000;
            overflow: hidden;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .gallery-card:hover .image-box img {
            transform: scale(1.1);
        }

        .info-box {
            padding: 20px;
        }

        .info-title {
            font-size: 1.2rem;
            color: #ffffff;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .info-desc {
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.6;
            margin: 0;
        }

        #loading-message {
            text-align: center;
            color: #00ff99;
            padding: 50px;
            font-size: 1.1rem;
        }

        /* --- 魔法のレスポンシブ（スマホ用） --- */
        @media screen and (max-width: 768px) {
            header {
                padding: 15px 10px !important;
                gap: 12px !important;
            }

            .logo {
                font-size: 1.5rem !important;
            }

            nav ul {
                gap: 12px !important;
                flex-wrap: wrap;
                justify-content: center !important;
            }

            nav a {
                font-size: 13px !important;
            }

            .btn-booking {
                width: 80% !important;
                text-align: center !important;
                padding: 10px 0 !important;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">CRESTA-AUTO</div>
        <nav>
            <ul>
                <li><a href="index.html">ホーム</a></li>
                <li><a href="cars.html">車両一覧</a></li>
                <li><a href="news.html">お知らせ</a></li>
                <li><a href="gallery.html" class="active">ギャラリー</a></li>
            </ul>
        </nav>
        <a href="https://docs.google.com/forms/d/1zPGI6HD4iRVSvvlWbTxiSdbSgxjjRqCrUDru-jT1QO8/viewform" class="btn-booking">予約する</a>
    </header>

    <main class="container">
        <h1 class="page-title">GALLERY</h1>
        
        <div id="loading-message">読み込み中...</div>
        <div id="gallery-container" class="gallery-grid"></div>
    </main>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzCohegTqgSW7R5t8Oxr_eFw7bB4zjNEVW4vy3vNYFDsGCiWJnBeMtHXAQOqEEasoZt/exec?action=getGallery";

        async function loadGallery() {
            const container = document.getElementById('gallery-container');
            const loading = document.getElementById('loading-message');

            try {
                const response = await fetch(GAS_API_URL);
                const data = await response.json();
                
                loading.style.display = 'none';

                if (!Array.isArray(data) || data.length === 0) {
                    loading.innerText = "表示できる画像がありません。";
                    return;
                }

                data.forEach(item => {
                    if (!item.id) return;

                    const card = document.createElement('div');
                    card.className = 'gallery-card';

                    const imgUrl = item.url || "https://placehold.jp/24/333333/ffffff/400x250.png?text=No%20Image";

                    card.innerHTML = `
                        <div class="image-box">
                            <img src="${imgUrl}" alt="${item.title}" onerror="this.src='https://placehold.jp/24/333333/ffffff/400x250.png?text=Error'">
                        </div>
                        <div class="info-box">
                            <h2 class="info-title">${item.title || 'Untitled'}</h2>
                            <p class="info-desc">${item.description || ''}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                loading.innerText = "データの取得に失敗しました。";
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
