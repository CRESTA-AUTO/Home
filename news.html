<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ - CRESTA-AUTO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* cars.html と共通のヘッダー・全体の整合性 */
        #news-list-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            align-items: center;
        }

        /* お知らせカード (cars.htmlのカード構成をベースに) */
        .news-card {
            width: 800px; /* バランスを見て広めに設定 */
            background-color: #fff;
            display: flex;
            flex-direction: column;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 8px solid #ff00ff; /* お知らせのアクセントカラー */
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .news-title {
            font-size: 1.5rem;
            margin: 0;
            color: #333;
            max-width: 70%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .news-date {
            font-size: 0.9rem;
            color: #888;
            font-weight: bold;
        }

        .news-content {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
            white-space: pre-wrap; /* 改行を有効に */
        }

        .loading-message {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        /* レスポンシブ対応 */
        @media (max-width: 850px) {
            .news-card { width: 90%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">CRESTA-AUTO</div>
        <nav>
            <ul>
                <li><a href="index.html">ホーム</a></li>
                <li><a href="cars.html">車両一覧</a></li>
                <li><a href="news.html" class="active">お知らせ</a></li>
            </ul>
        </nav>
        <a href="index.html#contact" class="btn-booking">お問い合わせ</a>
    </header>

    <main>
        <div id="news-list-container">
            <p id="loading-message" class="loading-message">お知らせを読み込み中です...</p>
        </div>
    </main>

    <script>
        // デプロイしたGASのURLを貼り付けてください
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzCohegTqgSW7R5t8Oxr_eFw7bB4zjNEVW4vy3vNYFDsGCiWJnBeMtHXAQOqEEasoZt/exec"; 

        async function fetchNews() {
            const container = document.getElementById('news-list-container');
            try {
                // action=getNews を付けてリクエスト
                const response = await fetch(`${GAS_API_URL}?action=getNews`);
                const newsData = await response.json();
                
                if (!newsData || newsData.length === 0) {
                    container.innerHTML = '<p class="loading-message">現在お知らせはありません。</p>';
                    return;
                }

                container.innerHTML = '';

                // スプレッドシートの項目名（日付, タイトル, 内容）に合わせて表示
                // 新しい順にする場合は reverse() を入れる
                newsData.reverse().forEach(item => {
                    const card = `
                        <article class="news-card">
                            <div class="news-header">
                                <h2 class="news-title">${item.タイトル || '無題のお知らせ'}</h2>
                                <time class="news-date">${item.日付 || ''}</time>
                            </div>
                            <div class="news-content">${item.内容 || ''}</div>
                        </article>
                    `;
                    container.innerHTML += card;
                });

            } catch (error) {
                console.error(error);
                document.getElementById('loading-message').innerText = "お知らせの読み込みに失敗しました。";
            }
        }

        fetchNews();
    </script>
</body>
</html>
