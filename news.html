<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ - CRESTA-AUTO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* レイアウト調整 */
        #news-list-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .news-card {
            width: 100%;
            max-width: 800px;
            background-color: #333;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 8px solid #00ff99; /* お知らせアクセント */
            box-sizing: border-box;
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .news-title {
            font-size: 1.4rem;
            margin: 0;
            color: #fff;
            font-weight: bold;
        }

        .news-date {
            font-size: 0.9rem;
            color: #999;
        }

        .news-content {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
            white-space: pre-wrap; /* 改行反映 */
        }

        .loading-message {
            text-align: center;
            padding: 50px;
            color: #999;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">CRESTA-AUTO</div>
        <nav>
            <ul>
                <li><a href="index.html">ホーム</a></li>
                <li><a href="cars.html">車両一覧</a></li>
                <li><a href="news.html" class="active">お知らせ</a></li>
            </ul>
        </nav>
<a href="https://docs.google.com/forms/d/1zPGI6HD4iRVSvvlWbTxiSdbSgxjjRqCrUDru-jT1QO8/viewform" class="btn-booking">予約する</a>
    </header>

    <main>
        <div id="news-list-container">
            <p id="loading-message" class="loading-message">お知らせを読み込み中です...</p>
        </div>
    </main>

<script>
    // デプロイしたGASのURL
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzCohegTqgSW7R5t8Oxr_eFw7bB4zjNEVW4vy3vNYFDsGCiWJnBeMtHXAQOqEEasoZt/exec"; 

    async function fetchNews() {
        const container = document.getElementById('news-list-container');
        try {
            // ★ポイント：?action=getNews を付けて、GASの getNewsData() を呼び出す
            const response = await fetch(`${GAS_API_URL}?action=getNews`);
            const newsData = await response.json();
            
            if (!newsData || newsData.length === 0) {
                container.innerHTML = '<p class="loading-message">現在お知らせはありません。</p>';
                return;
            }

            container.innerHTML = '';

            // ★ポイント：GASの getNewsData で定義されている英語のキー（date, title, content）を使う
            newsData.forEach(item => {
                const card = `
                    <article class="news-card">
                        <div class="news-header">
                            <h2 class="news-title">${item.title || '無題のお知らせ'}</h2>
                            <time class="news-date">${item.date || ''}</time>
                        </div>
                        <div class="news-content">${item.content || ''}</div>
                    </article>
                `;
                container.innerHTML += card;
            });

        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('loading-message').innerText = "お知らせの読み込みに失敗しました。";
        }
    }

    fetchNews();
</script>
</body>
</html>
